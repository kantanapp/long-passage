    passageTitle: 'The Rise of Urban Farming',
    passage: `Cities around the world are increasingly embracing urban farming as a solution to food security challenges. From rooftop gardens in New York to vertical farms in Singapore, these innovative approaches to agriculture are transforming how urban residents think about food production.

Urban farming encompasses a wide range of activities, from small community gardens to large-scale indoor vertical farms. These operations can produce a variety of crops, including vegetables, herbs, and even fish through aquaponics systems. In many cities, unused spaces such as abandoned lots, parking structures, and building rooftops have been converted into productive growing areas.

The benefits of urban farming extend beyond simply providing fresh produce. Studies have shown that community gardens improve mental health by offering residents a connection to nature and opportunities for social interaction. In densely populated cities, these green spaces also help reduce the urban heat island effect, where cities tend to be significantly warmer than surrounding rural areas due to the abundance of heat-absorbing surfaces like concrete and asphalt.

    passageTitle: 'The Science of Sleep',
    passage: `Sleep is one of the most fundamental biological processes, yet its exact purpose remained a mystery to scientists for many years. Recent advances in neuroscience have shed new light on why humans and most animals spend roughly one-third of their lives in this state of reduced consciousness.

For decades, researchers believed that sleep primarily served as a period of rest and recovery for the body. While this is partially true—muscles repair themselves and the immune system strengthens during sleep—scientists have discovered that the brain undergoes equally important processes during this time. One of the most significant discoveries concerns the glymphatic system, a network of channels in the brain that becomes particularly active during sleep.

The glymphatic system functions as the brain's waste-clearance mechanism. During sleep, cerebrospinal fluid flows through these channels, flushing out toxic proteins and cellular waste products that accumulate during waking hours. Among the substances removed is beta-amyloid, a protein associated with Alzheimer's disease. This finding has led researchers to hypothesize that chronic sleep deprivation may contribute to the development of neurodegenerative diseases by preventing adequate clearance of these harmful substances.

Sleep is also essential for memory consolidation. During the rapid eye movement (REM) stage, the brain processes and organizes experiences from the day, transferring information from short-term to long-term memory storage. Studies with both humans and animals have demonstrated that sleep deprivation significantly impairs the ability to learn and retain new information.

The implications of these findings extend to public health policy. In many modern societies, chronic sleep deprivation has become increasingly common due to demanding work schedules, increased screen time, and other lifestyle factors. Health authorities have begun to emphasize that adequate sleep—typically seven to nine hours for adults—should be considered as important as proper nutrition and regular exercise for maintaining overall health.`,

    passageTitle: 'The Malleability of Human Memory',
    passage: `For much of the twentieth century, scientists and legal professionals alike operated under the assumption that human memory functions like a video recorder, faithfully capturing and storing experiences for later playback. This view has been fundamentally challenged by decades of research in cognitive psychology, which has demonstrated that memory is far more reconstructive than reproductive in nature.

The pioneering work of cognitive psychologist Elizabeth Loftus has been particularly influential in reshaping our understanding of memory. Through a series of landmark experiments conducted in the 1970s, Loftus demonstrated that eyewitness memories could be altered through the introduction of misleading post-event information. In one famous study, participants who witnessed a simulated car accident were asked leading questions implying either a stop sign or a yield sign was present. When later asked to recall what they had seen, many participants reported seeing the sign suggested in the question, even when it contradicted what they had actually witnessed.

This phenomenon, known as the misinformation effect, has profound implications for the legal system. Research suggests that eyewitness testimony, long considered highly reliable, can be significantly distorted by factors ranging from the wording of police interview questions to media coverage of a crime. Studies have found that a substantial proportion of wrongful convictions in the United States involved eyewitness misidentification, highlighting the potentially devastating consequences of memory's malleability.

Memory researchers have also identified source monitoring errors as a contributing factor in false memory formation. When people reconstruct memories, they sometimes confuse the source of information, misattributing imagined events to actual experiences or conflating details from different episodes into a single narrative. This tendency becomes more pronounced when the original memory trace is weak or when considerable time has elapsed since the original event.

The neural basis of memory malleability has become clearer through advances in neuroimaging technology. Research has shown that the act of remembering itself can alter memories, as the neural networks activated during recall are susceptible to modification. This reconsolidation process means that every time a memory is retrieved, it becomes temporarily vulnerable to change before being re-stored in a potentially altered form.

    passageTitle: 'The Economics of Artificial Intelligence',
    passage: `The rapid proliferation of artificial intelligence technologies has sparked intense debate among economists about the long-term implications for labor markets and economic inequality. While technological optimists point to historical precedents suggesting that automation ultimately creates more jobs than it destroys, a growing body of research indicates that AI may represent a fundamentally different kind of technological transition.

Previous waves of automation, from the Industrial Revolution to the computerization of the late twentieth century, primarily displaced workers performing routine physical or cognitive tasks. These workers were often able to transition to new occupations requiring different skills, and the productivity gains generated by automation contributed to broader economic growth. Economists who subscribe to this view argue that fears of technological unemployment are historically unfounded.

However, critics contend that AI systems are qualitatively different from earlier technologies because of their capacity for generalization. Unlike previous automation tools designed for specific, well-defined tasks, advanced AI systems can perform an increasingly broad range of cognitive functions. Natural language processing models can now write legal documents, perform medical diagnoses, and generate software code—tasks previously thought to require uniquely human judgment and expertise. This breadth raises the possibility that AI may simultaneously displace workers across multiple sectors rather than sequentially displacing specific occupation categories.

The distributional effects of AI adoption are also a subject of considerable concern. Research has found that while AI tends to increase overall productivity and aggregate economic output, the gains are disproportionately captured by capital owners and highly skilled workers who can leverage AI as a complement to their own capabilities. Workers in lower-skill occupations, particularly those in service industries and administrative roles, face greater displacement risk with fewer pathways to transition into new, well-compensated positions.

Policymakers are increasingly grappling with how to respond to these challenges. Proposals range from targeted retraining programs and expanded education initiatives to more radical interventions such as universal basic income schemes or taxes on automation. The effectiveness of these approaches remains contested, with economists divided on both the severity of AI-driven labor market disruption and the appropriate policy responses. What appears clear is that the trajectory of AI development will have profound consequences for the structure of work and the distribution of economic prosperity in the coming decades.`,

    passageTitle: 'Coral Reefs and Climate Change',
    passage: `Coral reefs are among the most biologically diverse ecosystems on Earth, supporting approximately 25% of all marine species despite covering less than 1% of the ocean floor. However, these remarkable structures are facing unprecedented threats from climate change, placing the millions of species that depend on them in serious danger.

Coral reefs are built by tiny animals called coral polyps, which form symbiotic relationships with microscopic algae known as zooxanthellae. These algae live within the coral's tissues and provide up to 90% of the coral's energy needs through photosynthesis. When ocean temperatures rise even slightly above normal levels, this relationship breaks down. The coral expels the algae from its tissues, causing it to turn white — a phenomenon called coral bleaching.

While bleaching does not immediately kill coral, it severely weakens the organisms and makes them vulnerable to disease. If water temperatures remain elevated for several weeks, large portions of a reef can die. Scientists have documented several mass bleaching events in recent decades, with the most severe occurring in 2016 and 2017. These events damaged significant portions of the Great Barrier Reef, the world's largest coral reef system, which stretches over 2,300 kilometers off the coast of Australia.

Beyond temperature increases, coral reefs also face threats from ocean acidification. As the atmosphere absorbs more carbon dioxide, oceans become more acidic, making it harder for corals to build their calcium carbonate skeletons. This process not only prevents new coral growth but can dissolve existing reef structures.

    passageTitle: 'The Benefits of Bilingual Education',
    passage: `The number of children receiving bilingual education is growing around the world, as families and governments recognize the cognitive and social benefits of learning two languages simultaneously. While some parents worry that learning two languages at once may confuse young children or slow their linguistic development, research increasingly suggests the opposite.

Studies conducted at universities in Canada, the United States, and Europe have consistently found that bilingual children develop stronger executive function skills compared to their monolingual peers. Executive function refers to a set of mental processes that help people control their behavior, including the abilities to focus attention, switch between tasks, and solve problems. Researchers believe that regularly managing two language systems forces the brain to constantly choose which language to use and suppress the other, providing a mental workout that strengthens these cognitive abilities.

Bilingualism also appears to provide long-term brain health benefits. Several studies have suggested that bilingual individuals develop symptoms of Alzheimer's disease and other forms of dementia an average of four to five years later than those who speak only one language. Scientists hypothesize that the mental exercise involved in managing two languages builds what researchers call "cognitive reserve" — a greater degree of resistance to brain deterioration.

In terms of academic outcomes, bilingual education programs vary considerably in their effectiveness depending on their design. Research shows that programs that use both languages as genuine mediums of instruction — rather than simply teaching a second language as a subject — tend to produce the strongest academic results. Students in well-designed bilingual programs often catch up to or exceed the academic performance of students educated entirely in their native language by the time they reach secondary school.

    passageTitle: 'Microplastics in the Environment',
    passage: `Over the past decade, scientists have become increasingly concerned about the presence of microplastics — tiny plastic particles measuring less than five millimeters — in the world's oceans, freshwater systems, and even the human body. These particles originate from a variety of sources, including the gradual breakdown of larger plastic items, synthetic textile fibers released during washing, and industrial processes.

    passageTitle: 'Drones in Modern Industry',
    passage: `Unmanned aerial vehicles, commonly known as drones, were originally developed for military purposes but have rapidly found applications across a wide range of civilian industries. From agriculture to healthcare delivery, these remotely operated aircraft are transforming how businesses operate and creating new possibilities that were unimaginable just a decade ago.

In agriculture, drones equipped with cameras and sensors are being used to monitor crop health across large farm areas with far greater efficiency than traditional ground-based methods. By capturing high-resolution images in infrared and other wavelengths, agricultural drones can identify early signs of disease, pest infestations, or water stress in specific sections of a field before these problems become visible to the human eye. This allows farmers to apply treatments precisely where needed rather than across entire fields, reducing the use of pesticides and fertilizers while improving crop yields.

The delivery of medical supplies represents another significant application. In remote or infrastructure-poor regions, delivering essential medicines, blood samples, and vaccines by road can take hours or even days. Drone delivery services have been successfully implemented in countries including Rwanda and Ghana, where they have dramatically reduced the time required to deliver blood products to hospitals in urgent situations.

Beyond agriculture and delivery, drones are increasingly being used in construction and infrastructure inspection. Inspecting tall structures such as bridges, power lines, and wind turbines traditionally required workers to use scaffolding or specialized equipment, which was both costly and dangerous. Drones equipped with high-definition cameras can perform these inspections more quickly, at lower cost, and without exposing workers to risk.

Despite these advantages, widespread drone use raises concerns about privacy, as drones equipped with cameras can easily capture images of private property and individuals. Regulatory bodies in many countries are working to establish frameworks that balance the economic benefits of drone technology with the need to protect civil liberties.`,

    passageTitle: 'The Human Gut Microbiome',
    passage: `The human body contains approximately 38 trillion bacteria, most of which reside in the large intestine. This vast community of microorganisms, collectively known as the gut microbiome, plays a crucial role in human health that scientists are only beginning to understand. Far from being passive passengers, these bacteria actively influence digestion, immune function, and even mental health.

The gut microbiome assists in breaking down dietary fiber and other complex carbohydrates that human digestive enzymes cannot process. During this breakdown, beneficial bacteria produce short-chain fatty acids, which serve as an energy source for the cells lining the intestine and help maintain the integrity of the gut barrier. A healthy gut barrier prevents harmful substances from entering the bloodstream while allowing nutrients to pass through.

Research has revealed a strong connection between the gut microbiome and the immune system. Approximately 70% of the body's immune cells are located in or near the gut. The microbiome trains these immune cells to distinguish between harmless microorganisms and genuine threats, helping to prevent inappropriate immune responses that can lead to allergies and autoimmune conditions. Studies have found that individuals with reduced microbial diversity in their gut are more likely to develop such conditions.

Perhaps most surprisingly, scientists have discovered a bidirectional communication pathway between the gut and the brain, known as the gut-brain axis. The gut contains millions of nerve cells and produces approximately 90% of the body's serotonin — a neurotransmitter strongly associated with mood regulation. Research suggests that alterations in gut bacteria composition can influence anxiety, depression, and cognitive function.

    passageTitle: 'Public Libraries in the Digital Age',
    passage: `Public libraries have existed for centuries as institutions dedicated to providing communities with free access to knowledge and information. In recent decades, however, these institutions have had to adapt significantly in response to digital technology. Rather than becoming obsolete, many libraries have reinvented themselves as vibrant community hubs that offer far more than books.

The digitization of books, magazines, and newspapers has changed how people access information. Many public libraries now offer digital lending services that allow patrons to borrow e-books and audiobooks through smartphone applications, eliminating the need to visit a physical location. However, concerns remain about the pricing practices of publishers, who often charge libraries significantly more for digital lending rights than for physical copies of the same works.

Modern libraries frequently offer programs that extend well beyond traditional book lending. Maker spaces equipped with 3D printers, laser cutters, and recording studios allow community members to develop creative and technical skills. Libraries also host events ranging from language conversation groups and coding classes to community health screenings. In doing so, they serve as gathering places that foster connection and lifelong learning.

    passageTitle: 'The Neuroscience of Creativity',
    passage: `The nature of creativity has fascinated philosophers, artists, and scientists for centuries. Only relatively recently have neuroscientists developed the tools necessary to investigate what actually occurs in the brain when people engage in creative thinking. The emerging picture challenges many popular assumptions about how creative ideas arise.

For decades, creativity was popularly associated with the right hemisphere of the brain, while logical thinking was attributed to the left hemisphere. This dichotomy, though appealing in its simplicity, has been largely discredited by modern neuroscience. Brain imaging studies have consistently found that creative tasks activate widespread networks distributed across both hemispheres, with no single region acting as a creativity center. Instead, creative thinking emerges from the coordinated interaction of multiple large-scale brain networks.

Neuroscientists have identified three networks that appear particularly important in the creative process. The default mode network, which is active when people are not focused on specific tasks — during daydreaming or mind-wandering — is associated with generating novel ideas and making unexpected connections between distant concepts. The executive control network is engaged when people deliberately focus attention and evaluate ideas critically. The salience network serves as a switching mechanism, directing attention between these two systems. Effective creativity seems to require the flexible and coordinated operation of all three networks.

This framework helps explain a phenomenon that many creative individuals report: significant insights often arise not during intense focused work but during relaxed states — while walking, bathing, or lying in bed. During such activities, the default mode network becomes highly active, allowing the mind to make associative connections across a wider range of stored knowledge than is possible during focused concentration. The subsequent engagement of the executive control network then allows these raw ideas to be evaluated and refined.

The neuroscience of creativity also sheds light on enhancement techniques. Meditation has been shown to increase connectivity between brain regions, potentially facilitating flexible network interactions associated with creative thinking. Research into sleep suggests that REM sleep, during which the brain makes highly associative connections, may be particularly important for creative problem-solving. Conversely, high levels of stress have been found to restrict activity in the default mode network, potentially explaining why creativity often suffers under pressure.

Despite this progress, significant mysteries remain. The precise neural mechanisms by which disparate pieces of stored information are combined into genuinely novel ideas have not yet been fully described. Some researchers also note that the most valuable aspects of human creativity — aesthetic judgment, the decision of what makes one idea better than another — remain deeply resistant to computational explanation.`,

    passageTitle: 'Globalization and Cultural Homogenization',
    passage: `The acceleration of globalization over the past several decades has prompted extensive scholarly debate about its cultural consequences. Among the most contentious issues is the phenomenon of cultural homogenization — the concern that the spread of global consumer culture, dominant media, and international corporations is eroding the world's cultural diversity, potentially replacing distinct local traditions with a uniform, often Western-influenced, global monoculture.

The evidence for cultural homogenization is visible in patterns of consumption and media across the world. Global fast-food chains, clothing brands, and entertainment products have penetrated markets on every inhabited continent, creating similar consumer landscapes from São Paulo to Seoul. The dominance of English as the language of international business, science, and digital communication has led to concerns that linguistic diversity is being lost as smaller languages lose speakers to more economically advantageous alternatives. UNESCO estimates that approximately half of the world's 7,000 languages are endangered, with many expected to disappear within the coming century.

However, critics of the homogenization thesis argue that the relationship between globalization and cultural change is considerably more complex. Cultural anthropologists have documented numerous instances in which local cultures do not simply absorb global influences but actively transform them, incorporating foreign elements into existing traditions in ways that create new hybrid cultural forms rather than replacing indigenous ones. This process, often called "glocalization," suggests that cultures possess considerable adaptive resilience when confronted with external influences.

Furthermore, globalization has in some respects facilitated rather than suppressed cultural diversity. Digital platforms have given minority cultural producers unprecedented access to global audiences, enabling the survival and even flourishing of musical traditions, craft practices, and artistic forms that might otherwise have been overwhelmed by mainstream commercial culture. The global popularity of previously regionally confined cultural forms — K-pop, anime, Bollywood cinema — suggests that the flow of cultural influence is increasingly multidirectional rather than simply emanating from a Western center.

Yet concerns about cultural power imbalances remain legitimate. The infrastructure of global cultural distribution — platforms, media conglomerates, advertising systems — remains heavily concentrated in a small number of countries and corporations, raising questions about whose values and aesthetics are systematically privileged in global cultural markets. Critics argue that while superficial cultural diversity may be increasing, the economic and structural conditions that allow cultures to genuinely thrive on their own terms remain deeply unequal.`,

    passageTitle: 'The Ethics of CRISPR Gene Editing',
    passage: `The development of CRISPR-Cas9 gene editing technology has presented humanity with extraordinary possibilities and equally profound ethical dilemmas. Unlike previous genetic engineering techniques, CRISPR allows scientists to make precise, targeted modifications to DNA sequences with relative ease and low cost, dramatically lowering the barriers to genetic intervention in plants, animals, and human cells.

In the medical field, the therapeutic potential of CRISPR is considerable. Clinical trials are underway using CRISPR-based treatments for genetic conditions including sickle cell disease and certain forms of blindness, and early results have been promising. Somatic gene therapy — editing the cells of living patients — is generally considered ethically acceptable within the medical community, provided it meets standard criteria for safety and efficacy, as its effects are limited to the individual being treated and are not inherited by future generations.

The prospect of germline editing, however — modifying reproductive cells or embryos so that genetic changes are passed to all subsequent generations — raises far more contentious ethical questions. In 2018, a Chinese researcher announced the birth of twin girls whose embryos had been modified using CRISPR to confer resistance to HIV. The announcement provoked immediate and widespread condemnation from the scientific community. Critics argued that the intervention was premature given current safety uncertainties, unnecessary because safer ways to prevent HIV transmission exist, and potentially harmful because the consequences of deliberately altering the human germline are not yet understood.

Beyond immediate safety concerns lies the more fundamental question of whether germline editing constitutes an ethically permissible form of human enhancement or an impermissible form of "designer baby" creation. Proponents argue that preventing heritable genetic diseases is a natural extension of medicine's objective to reduce suffering. Opponents argue that selecting or modifying heritable traits violates important principles: it could limit the autonomy of future generations who have no say in the matter, exacerbate social inequalities if enhancements are available only to the wealthy, and reflect a troubling attitude toward human imperfection and diversity.

The governance of gene editing technology presents another significant challenge. Genetic modifications made in one country under permissive regulatory conditions can easily cross international borders, making it difficult for any single nation's regulations to effectively govern the technology. International scientific bodies have called for coordinated global oversight mechanisms, but achieving meaningful international consensus on bioethical issues has historically proven formidable.`,

    id: 'n-1-2021-1', level: 1, year: 2021, season: '第1回', number: '長文問題 B',
    passageTitle: 'Behavioral Economics and Nudge Theory',
    passage: `Classical economic theory rested on the assumption that human beings are fundamentally rational agents who consistently make decisions that maximize their own utility. This model, sometimes embodied in the figure of "Homo Economicus," provided the theoretical foundation for much of twentieth-century economics and policy. However, a growing body of experimental research has revealed systematic patterns of decision-making that deviate significantly from rational choice predictions — findings that gave rise to the field of behavioral economics.

Two of the most influential figures in the development of behavioral economics were psychologists Daniel Kahneman and Amos Tversky, whose collaborative research in the 1970s and 1980s identified numerous cognitive biases — systematic errors in human judgment — that affect economic decision-making. Their prospect theory, for which Kahneman later received the Nobel Prize in Economics, demonstrated that people do not evaluate outcomes in terms of absolute values but relative to a reference point, and that losses are felt more intensely than equivalent gains — a phenomenon known as loss aversion. This asymmetry influences decisions ranging from investment behavior to healthcare choices.

Another significant finding concerns the effect of how choices are presented — what behavioral economists call framing effects. Studies have found that people respond differently to economically identical options depending on whether they are described in terms of potential gains or potential losses. A medical treatment described as having a 90% survival rate attracts more support than one described as having a 10% mortality rate, even though these descriptions convey identical information. Similarly, people make systematically different retirement savings decisions depending on whether a contribution scheme requires active enrollment or makes enrollment the default option.

This last observation gave rise to the concept of nudging — using the design of choice environments to steer individuals toward decisions that are in their own best interests, without restricting their freedom to choose otherwise. Governments in the United Kingdom, the United States, and several other countries have established nudge units — departments dedicated to applying behavioral insights to improve policy outcomes. Interventions have ranged from changing default font sizes on tax notices to redesigning cafeteria layouts to encourage healthier food choices in schools.

The application of behavioral insights to public policy is not without controversy. Critics from both progressive and libertarian traditions have raised concerns about the paternalistic assumption that governments can reliably determine what is in citizens' best interests, and about the potential for nudge techniques to be used manipulatively by corporations or governments pursuing objectives that do not align with citizens' own preferences.`,

let S = {
  view: 'list',        // 'list' | 'problem' | 'progress' | 'bookmarks'
  filterLevel: 'all',
  filterYear: 'all',
  problemId: null,
  qIdx: 0,
  selectedAnswer: null,
  showOcr: false,
  ocrProcessing: false,
  ocrImage: null,
  ocrText: '',
  showAdd: false,
  addPrefill: '',
};

let U = { progress: {}, bookmarks: [], custom: [] };

function loadU() {
  try { const d = localStorage.getItem('eiken_v1'); if (d) U = {...U, ...JSON.parse(d)}; } catch(e) {}
}
function saveU() {
  try { localStorage.setItem('eiken_v1', JSON.stringify(U)); } catch(e) {}
}

// ============================================================
// HELPERS
// ============================================================
function allProblems() { return [...SAMPLE_PROBLEMS, ...U.custom]; }

function filteredProblems() {
  let ps = allProblems();
  if (S.filterLevel !== 'all') ps = ps.filter(p => p.level === +S.filterLevel);
  if (S.filterYear !== 'all') ps = ps.filter(p => p.year === +S.filterYear);
  return ps;
}

function problem(id) { return allProblems().find(p => p.id === id); }
function prog(id) { return U.progress[id] || {}; }
function bookmarked(id) { return U.bookmarks.includes(id); }

function toggleBM(id) {
  U.bookmarks = bookmarked(id) ? U.bookmarks.filter(x => x !== id) : [...U.bookmarks, id];
  saveU(); render();
}

function recordAnswer(problemId, qIdx, sel, correct) {
  if (!U.progress[problemId]) U.progress[problemId] = {};
  U.progress[problemId][qIdx] = { sel, correct: sel === correct, at: Date.now() };
  saveU();
}

function stats() {
  let tot=0, ans=0, cor=0, l1={t:0,a:0,c:0}, l2={t:0,a:0,c:0};
  allProblems().forEach(p => {
    const lv = p.level === 1 ? l1 : l2;
    p.questions.forEach((q,i) => {
      tot++; lv.t++;
      const r = (U.progress[p.id]||{})[i];
      if (r) { ans++; lv.a++; if(r.correct){cor++;lv.c++;} }
    });
  });
  return {tot,ans,cor,l1,l2};
}

function years() {
  return [...new Set(allProblems().map(p=>p.year))].sort((a,b)=>b-a);
}

// ============================================================
// NAVIGATION
// ============================================================
function go(view, extra={}) {
  Object.assign(S, {view, ...extra});
  render(); window.scrollTo(0,0);
}

function openProblem(id) {
  S.problemId = id; S.qIdx = 0; S.selectedAnswer = null;
  go('problem');
}

function setFilter(type, val) {
  if(type==='level') S.filterLevel = val;
  if(type==='year') S.filterYear = val;
  render();
}

function selectOpt(i) {
  const p = problem(S.problemId);
  if (!p || (prog(S.problemId)[S.qIdx] !== undefined)) return;
  S.selectedAnswer = i; render();
}

function submitAns() {
  if (S.selectedAnswer === null) return;
  const p = problem(S.problemId);
  const q = p.questions[S.qIdx];
  recordAnswer(S.problemId, S.qIdx, S.selectedAnswer, q.correctAnswer);
  render();
}

function goQ(i) {
  S.qIdx = i; S.selectedAnswer = null; render();
}

function problemCard(p) {
  const pr = prog(p.id);
  const answered = Object.keys(pr).length;
  const correct  = Object.values(pr).filter(x=>x.correct).length;
  const total    = p.questions.length;
  const pct      = answered>0 ? Math.round(correct/answered*100) : 0;
  const bm       = bookmarked(p.id);
  const lvCls    = p.level===1 ? 'bg-purple-100 text-purple-700' : 'bg-emerald-100 text-emerald-700';
  const barCls   = pct>=80?'bg-emerald-500':pct>=50?'bg-amber-400':'bg-indigo-400';

  return `
  <div class="bg-white rounded-2xl shadow-sm p-5 card-hover cursor-pointer border border-transparent hover:border-slate-200"
    onclick="openProblem('${p.id}')">
    <div class="flex items-start justify-between mb-3">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${lvCls}">${p.level}級</span>

      </div>
      <button onclick="event.stopPropagation();toggleBM('${p.id}')"
        class="text-lg hover:scale-110 transition-transform leading-none">
        ${bm?'🔖':'🏷️'}
      </button>
    </div>
    <p class="text-xs font-medium text-slate-400 mb-0.5">${p.number}</p>
    <h3 class="font-bold text-slate-800 mb-4 text-[15px] leading-snug">${p.passageTitle}</h3>
    <div class="flex items-center gap-3">
      <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
        <div class="h-full ${barCls} rounded-full progress-bar" style="width:${answered>0?Math.round(answered/total*100):0}%"></div>
      </div>
      <span class="text-xs text-slate-400 whitespace-nowrap">
        ${answered>0?`${answered}/${total}問 · ${pct}%正解`:total+'問'}
      </span>
    </div>
    ${answered===total && total>0 ? `<p class="text-xs text-emerald-600 font-semibold mt-2">✓ 完了</p>`:''}

}

      <button onclick="go('list')" class="flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
        一覧
      </button>
      <span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${lvBg}">${p.level}級</span>
      <span class="text-xs text-slate-400">${p.year}年度 ${p.season} · ${p.number}</span>
      <button onclick="toggleBM('${p.id}')" class="ml-auto text-xl hover:scale-110 transition-transform">
        ${bookmarked(p.id)?'🔖':'🏷️'}
      </button>
    </div>

    <div class="grid gap-5 lg:grid-cols-[1fr_420px]">
      <!-- Passage -->
      <div class="bg-white rounded-2xl shadow-sm p-6">
        <h2 class="font-black text-slate-800 text-lg mb-3">${p.passageTitle}</h2>
        <hr class="border-slate-100 mb-4">
        <div class="passage-text text-[14.5px] text-slate-700 whitespace-pre-line">${p.passage}</div>
      </div>

      <!-- Questions panel -->
      <div>
        <!-- Q nav -->
        <div class="bg-white rounded-2xl shadow-sm p-4 mb-4">
          <div class="flex items-center gap-2">
            <span class="text-xs font-semibold text-slate-400 mr-1">問</span>
            ${p.questions.map((_,i)=>{
              const r = pr[i];
              return `<button onclick="goQ(${i})"
                class="w-9 h-9 rounded-full text-sm font-bold transition-all
                  ${i===S.qIdx?'ring-2 ring-indigo-400 ring-offset-1 ':''}
                  ${r?(r.correct?'bg-emerald-100 text-emerald-700':'bg-red-100 text-red-600'):'bg-slate-100 text-slate-500'}">
                ${i+1}
              </button>`;
            }).join('')}
          </div>
        </div>

        <!-- Question card -->
        <div class="bg-white rounded-2xl shadow-sm p-5 fade-in">
          <p class="text-[14px] font-medium text-slate-800 leading-relaxed mb-4">
            <span class="font-black text-indigo-600 mr-1.5">Q${S.qIdx+1}.</span>${q.text}
          </p>

          <div class="space-y-2.5">
            ${q.options.map((opt,i)=>{
              let cls = 'bg-white border-2 border-slate-200 text-slate-700 hover:border-indigo-300 hover:bg-indigo-50';
              if (cur !== undefined) {
                if (i===q.correctAnswer)      cls = 'answered bg-emerald-50 border-2 border-emerald-400 text-emerald-800';
                else if (i===cur.sel && !cur.correct) cls = 'answered bg-red-50 border-2 border-red-400 text-red-700';
                else                          cls = 'answered bg-white border-2 border-slate-100 text-slate-400';
              } else if (S.selectedAnswer===i) cls = 'bg-indigo-50 border-2 border-indigo-400 text-indigo-800';
              const disabled = cur!==undefined ? 'pointer-events-none' : '';
              return `<button onclick="selectOpt(${i})"
                class="w-full text-left px-4 py-2.5 rounded-xl opt-btn text-[13.5px] font-medium ${cls} ${disabled}">
                <span class="font-bold mr-1.5">(${i+1})</span>${opt}
              </button>`;
            }).join('')}
          </div>

          ${cur !== undefined ? `
            <!-- Result + Explanation -->
            <div class="mt-4 fade-in">
              <div class="flex items-center gap-3 p-3 rounded-xl mb-3 ${cur.correct?'bg-emerald-50':'bg-red-50'}">
                <span class="text-2xl">${cur.correct?'⭕':'❌'}</span>
                <p class="font-bold text-sm ${cur.correct?'text-emerald-700':'text-red-700'}">
                  ${cur.correct?'正解！':'不正解。正解は ('+(q.correctAnswer+1)+') です'}
                </p>
              </div>
              <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
                <p class="text-xs font-bold text-amber-600 mb-1.5">📖 解説</p>
                <p class="text-[13px] text-slate-700 leading-relaxed">${q.explanation}</p>
              </div>
              <div class="flex gap-2.5 mt-4">
                ${S.qIdx>0?`<button onclick="goQ(${S.qIdx-1})" class="flex-1 py-2.5 border-2 border-slate-200 text-slate-600 rounded-xl text-sm font-medium hover:bg-slate-50">← 前</button>`:'<div class="flex-1"></div>'}
                ${S.qIdx<p.questions.length-1
                  ?`<button onclick="goQ(${S.qIdx+1})" class="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700">次の問題 →</button>`
                  :`<button onclick="go('list')" class="flex-1 py-2.5 bg-emerald-600 text-white rounded-xl text-sm font-bold hover:bg-emerald-700">✓ 完了</button>`}
              </div>
            </div>
          ` : `
            <button onclick="submitAns()"
              class="w-full mt-4 py-2.5 rounded-xl text-sm font-bold transition-all
                ${S.selectedAnswer!==null?'bg-indigo-600 text-white hover:bg-indigo-700':'bg-slate-100 text-slate-400 cursor-not-allowed'}">
              解答する
            </button>
          `}
        </div>
      </div>
    </div>
  </div>`;
}

// ---- PROGRESS VIEW ----
function progressView() {
  const st = stats();
  const pct = st.ans>0 ? Math.round(st.cor/st.ans*100) : 0;

  function lvCard(lv, d) {
    const p = d.a>0 ? Math.round(d.c/d.a*100) : 0;
    const [bg,bar,badge] = lv===1
      ? ['bg-white','bg-purple-500','bg-purple-100 text-purple-700']
      : ['bg-white','bg-emerald-500','bg-emerald-100 text-emerald-700'];
    return `
    <div class="${bg} rounded-2xl shadow-sm p-5">
      <div class="flex items-center gap-2 mb-4">
        <span class="px-3 py-0.5 rounded-full text-sm font-bold ${badge}">${lv}級</span>
        <span class="text-xs text-slate-400">${d.t}問</span>
      </div>
      <div class="flex items-end gap-1.5 mb-1">
        <span class="text-4xl font-black text-slate-800">${p}</span>
        <span class="text-slate-400 text-base mb-1">%</span>
      </div>
      <p class="text-xs text-slate-400 mb-3">正解率（${d.a}問回答・${d.c}問正解）</p>
      <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
        <div class="h-full ${bar} rounded-full progress-bar" style="width:${p}%"></div>
      </div>
    </div>`;
  }

  return `
  <div class="fade-in">
    <h2 class="text-2xl font-black text-slate-800 mb-5">学習進捗</h2>
    <div class="grid grid-cols-3 gap-4 mb-5">
      ${[
        {v:st.ans,  l:'回答済み問題数', cls:'text-slate-800'},
        {v:pct+'%', l:'全体正解率',      cls:pct>=80?'text-emerald-600':pct>=60?'text-amber-500':'text-red-500'},
        {v:U.bookmarks.length, l:'ブックマーク', cls:'text-slate-800'},
      ].map(x=>`
        <div class="bg-white rounded-2xl shadow-sm p-4 text-center">
          <div class="text-3xl font-black ${x.cls}">${x.v}</div>
          <div class="text-xs text-slate-400 mt-1">${x.l}</div>
        </div>`).join('')}
    </div>
    <div class="grid sm:grid-cols-2 gap-4 mb-5">
      ${lvCard(1,st.l1)}
      ${lvCard(2,st.l2)}
    </div>
    <div class="bg-white rounded-2xl shadow-sm p-5">
      <h3 class="font-bold text-slate-700 mb-4">問題別進捗</h3>
      <div class="space-y-2">
        ${allProblems().map(p=>{
          const pr = prog(p.id);
          const a  = Object.keys(pr).length;
          const c  = Object.values(pr).filter(x=>x.correct).length;
          const t  = p.questions.length;
          const pp = a>0 ? Math.round(c/a*100) : 0;
          const lvCls = p.level===1?'bg-purple-100 text-purple-700':'bg-emerald-100 text-emerald-700';
          const barCls= pp>=80?'bg-emerald-500':pp>=50?'bg-amber-400':'bg-red-400';
          return `
          <div class="flex items-center gap-3 p-2 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors -mx-2"
            onclick="openProblem('${p.id}')">
            <span class="text-xs px-2 py-0.5 rounded-full font-bold ${lvCls} whitespace-nowrap">${p.level}級</span>
            <div class="flex-1 min-w-0">
              <p class="text-sm text-slate-700 truncate">${p.passageTitle}</p>
              <div class="h-1.5 bg-slate-100 rounded-full mt-1 overflow-hidden">
                <div class="h-full ${barCls} rounded-full" style="width:${a>0?Math.round(a/t*100):0}%"></div>
              </div>
            </div>
            <span class="text-xs text-slate-400 whitespace-nowrap">${a>0?pp+'%':'未回答'}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

// ---- BOOKMARKS VIEW ----
function bookmarksView() {
  const bms = allProblems().filter(p=>bookmarked(p.id));
  return `
  <div class="fade-in">
    <h2 class="text-2xl font-black text-slate-800 mb-5">ブックマーク</h2>
    ${bms.length===0 ? `
      <div class="text-center py-16">
        <div class="text-5xl mb-3">🔖</div>
        <p class="text-slate-400">ブックマークした問題はありません</p>

// ---- OCR MODAL ----
function ocrModal() {
  if (!S.showOcr) return '';
  return `
  <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="closeOcr()">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="p-6">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bold text-lg text-slate-800">📷 画像OCR読み取り</h3>
          <button onclick="closeOcr()" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">✕</button>
        </div>
        <p class="text-xs text-slate-400 mb-4">過去問や参考書の画像をアップロードしてテキストを読み取ります。</p>

        <div class="border-2 border-dashed border-slate-300 rounded-xl p-5 text-center cursor-pointer hover:border-indigo-400 transition-colors"
          onclick="document.getElementById('ocr-input').click()">
          ${S.ocrImage
            ? `<img src="${S.ocrImage}" class="max-h-36 mx-auto rounded-lg mb-2 object-contain">`
            : `<div class="text-4xl mb-1">📁</div>`}
          <p class="text-sm text-slate-500">クリックして画像を選択</p>
          <p class="text-xs text-slate-300 mt-0.5">JPG・PNG対応</p>
        </div>
        <input type="file" id="ocr-input" accept="image/*" class="hidden" onchange="handleOcr(event)">

        ${S.ocrProcessing ? `
          <div class="mt-4 text-center">
            <div class="inline-block w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-2"></div>
            <p class="text-sm text-slate-500">読み取り中…</p>
          </div>
        ` : ''}

        ${S.ocrText ? `
          <div class="mt-4">
            <p class="text-xs font-semibold text-slate-500 mb-1.5">読み取り結果</p>
            <textarea id="ocr-edit" class="w-full border border-slate-200 rounded-xl p-3 text-sm text-slate-700 h-36 resize-none">${S.ocrText}</textarea>
            <p class="text-xs text-slate-300 mt-1 mb-3">内容を確認・編集してから問題追加フォームで使用できます</p>
            <button onclick="useOcr()"
              class="w-full py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700 transition-colors">
              このテキストを使って問題を追加
            </button>
          </div>
        ` : ''}
      </div>
    </div>
  </div>`;
}

// ---- ADD PROBLEM MODAL ----
let _qCount = 1;

function addModal() {
  if (!S.showAdd) return '';
  return `
  <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="closeAdd()">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="p-6">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-bold text-lg text-slate-800">＋ 問題を追加</h3>
          <div class="flex items-center gap-2">
            <button onclick="closeAdd();S.showOcr=true;render()"
              class="text-xs px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-colors">
              📷 OCRで読み取り
            </button>
            <button onclick="closeAdd()" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">✕</button>
          </div>
        </div>

        <div class="space-y-4">
          <div class="grid grid-cols-3 gap-3">
            <div>
              <label class="text-xs font-semibold text-slate-400 block mb-1">級</label>
              <select id="a-level" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white">
                <option value="1">1級</option>
                <option value="2" selected>2級</option>
              </select>
            </div>
            <div>
              <label class="text-xs font-semibold text-slate-400 block mb-1">年度</label>
              <input id="a-year" type="number" value="${new Date().getFullYear()}"
                class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm">
            </div>
            <div>
              <label class="text-xs font-semibold text-slate-400 block mb-1">回</label>
              <select id="a-season" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white">
                <option>第1回</option><option>第2回</option><option>第3回</option>
              </select>
            </div>
          </div>

          <div>
            <label class="text-xs font-semibold text-slate-400 block mb-1">パッセージタイトル</label>
            <input id="a-title" type="text" placeholder="例: The Future of Renewable Energy"
              class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm">
          </div>

          <div>
            <label class="text-xs font-semibold text-slate-400 block mb-1">英文パッセージ</label>
            <textarea id="a-passage" rows="8"
              placeholder="パッセージのテキストを貼り付けてください..."
              class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm resize-none">${S.addPrefill}</textarea>
          </div>

          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="text-xs font-semibold text-slate-400">設問</label>
              <button onclick="addQForm()" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">＋ 設問を追加</button>
            </div>
            <div id="q-list">${qForm(0)}</div>
          </div>

          <div class="flex gap-3 pt-1">
            <button onclick="closeAdd()"
              class="flex-1 py-2.5 border-2 border-slate-200 text-slate-600 rounded-xl text-sm font-medium hover:bg-slate-50">
              キャンセル
            </button>
            <button onclick="saveAdd()"
              class="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700 transition-colors">
              保存する
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function qForm(i) {
  return `
  <div class="border border-slate-200 rounded-xl p-4 mb-3" id="qf-${i}">
    <div class="flex items-center justify-between mb-2">
      <span class="text-sm font-bold text-slate-700">Q${i+1}</span>
      ${i>0?`<button onclick="document.getElementById('qf-${i}').remove()" class="text-xs text-red-400 hover:text-red-600">削除</button>`:''}
    </div>
    <textarea id="qt-${i}" rows="2" placeholder="問題文"
      class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm mb-3 resize-none"></textarea>
    ${[0,1,2,3].map(j=>`
      <div class="flex items-center gap-2 mb-2">
        <input type="radio" name="cor-${i}" value="${j}" id="r-${i}-${j}">
        <label for="r-${i}-${j}" class="text-xs text-slate-400 w-6">(${j+1})</label>
        <input id="qo-${i}-${j}" type="text" placeholder="選択肢 ${j+1}"
          class="flex-1 border border-slate-200 rounded-lg px-2 py-1.5 text-sm">
      </div>`).join('')}
    <textarea id="qe-${i}" rows="2" placeholder="解説（任意）"
      class="w-full border border-slate-200 rounded-xl px-3 py-2 text-xs mt-1 resize-none"></textarea>
  </div>`;
}

function addQForm() {
  const list = document.getElementById('q-list');
  if (!list) return;
  list.insertAdjacentHTML('beforeend', qForm(_qCount++));
}

// ---- MODAL CONTROLS ----
function showAdd() { S.showAdd=true; S.addPrefill=''; _qCount=1; render(); }
function closeAdd() { S.showAdd=false; render(); }
function closeOcr() { S.showOcr=false; render(); }

function handleOcr(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    S.ocrImage = e.target.result;
    S.ocrProcessing = true;
    S.ocrText = '';
    render();
    if (typeof Tesseract === 'undefined') {
      // Tesseract not loaded — load it dynamically
      const sc = document.createElement('script');
      sc.src = 'https://unpkg.com/tesseract.js@4/dist/tesseract.min.js';
      sc.onload  = () => runOcr(file);
      sc.onerror = () => { S.ocrProcessing=false; S.ocrText='(Tesseract.js の読み込みに失敗しました。テキストを手動で入力してください)'; render(); };
      document.head.appendChild(sc);
    } else {
      runOcr(file);
    }
  };
  reader.readAsDataURL(file);
}

function runOcr(file) {
  Tesseract.recognize(file, 'eng')
    .then(({data:{text}}) => {
      S.ocrProcessing = false;
      S.ocrText = text.trim() || '(テキストを読み取れませんでした)';
      render();
    })
    .catch(err => {
      S.ocrProcessing = false;
      S.ocrText = '(エラー: ' + err.message + ')';
      render();
    });
}

function useOcr() {
  const el = document.getElementById('ocr-edit');
  S.addPrefill = el ? el.value : S.ocrText;
  S.showOcr = false;
  S.showAdd = true;
  _qCount = 1;
  render();
}

// ---- SAVE NEW PROBLEM ----
function saveAdd() {
  const level   = parseInt(document.getElementById('a-level')?.value);
  const year    = parseInt(document.getElementById('a-year')?.value);
  const season  = document.getElementById('a-season')?.value;
  const title   = document.getElementById('a-title')?.value?.trim();
  const passage = document.getElementById('a-passage')?.value?.trim();

  if (!title || !passage) { alert('タイトルとパッセージは必須です'); return; }

  const questions = [];
  let i = 0;
  while (document.getElementById(`qf-${i}`)) {
    const text = document.getElementById(`qt-${i}`)?.value?.trim();
    if (text) {
      const options = [0,1,2,3].map(j => document.getElementById(`qo-${i}-${j}`)?.value?.trim() || `選択肢 ${j+1}`);
      let correctAnswer = 0;
      for (let j=0;j<4;j++) { if (document.getElementById(`r-${i}-${j}`)?.checked) { correctAnswer=j; break; } }
      const explanation = document.getElementById(`qe-${i}`)?.value?.trim() || '';
      questions.push({id:i, text, options, correctAnswer, explanation});
    }
    i++;
  }

  if (questions.length === 0) { alert('設問を1つ以上入力してください'); return; }

  U.custom.push({
    id: 'c-' + Date.now(),
    level, year, season,
    number: '長文問題',
    passageTitle: title,
    passage, questions
  });
  saveU();
  S.showAdd = false;
  S.addPrefill = '';
  render();
}
