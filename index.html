  passage: `Cultural festivals are celebrations that showcase the traditions, arts, food, and values of a particular community or nation. From Japan's cherry blossom festivals to Brazil's Carnival, these events attract both local participants and international tourists. They play an important role in preserving cultural heritage and passing traditions down to younger generations.

  passageTitle: 'Housework and Gender Roles',
  passage: `The division of housework within families has long been a topic of social debate. Traditionally, in many societies, women were expected to take primary responsibility for domestic tasks such as cooking, cleaning, and childcare, while men were expected to work outside the home. However, attitudes toward gender roles have changed significantly in recent decades, particularly in countries where more women have entered the workforce.

The unequal division of housework has broader consequences for society. When women spend more time on domestic tasks, they may have less time to pursue career advancement, education, or leisure activities. This can contribute to the gender pay gap, as women may be less able to take on extra responsibilities at work or seek higher-paying positions due to their domestic burden.

Experts suggest that families benefit when housework is divided fairly between partners. Children who grow up in households where domestic tasks are shared equally are more likely to adopt similar patterns in their own adult relationships. Schools and media also have a role to play in challenging outdated gender stereotypes and promoting the idea that housework is a shared responsibility regardless of gender.`,

  passageTitle: 'Reading for Pleasure',
  passage: `Reading for pleasure — choosing to read books, magazines, or other materials for enjoyment rather than for academic or professional purposes — has been associated with a wide range of benefits. While many people feel they do not have time for leisure reading in their busy lives, researchers argue that even small amounts of reading for pleasure can have a meaningful impact on a person's well-being and abilities.

Reading fiction, in particular, has been shown to enhance empathy. When readers immerse themselves in the lives of characters from different backgrounds and cultures, they develop a deeper understanding of perspectives different from their own. Researchers have described this as "theory of mind" — the ability to understand and imagine the mental states of others — and reading fiction has been shown to strengthen this ability.

Despite its benefits, reading for pleasure has declined in many countries in recent decades, particularly among young people. The rise of digital entertainment, including video games, streaming services, and social media, has created intense competition for people's attention. Educators and librarians are exploring new ways to make reading more attractive and accessible, such as promoting diverse books, creating reading clubs, and connecting reading to topics that young people find personally relevant.`,

  id: 's-2-2026-12',
  level: 2, year: 2026, season: 'オリジナル', number: '長文問題 B',
  passageTitle: 'Noise Pollution',
  passage: `Noise pollution refers to unwanted or harmful sounds in the environment that can negatively affect the health and well-being of humans and animals. It is most common in urban areas, where traffic, construction, industrial activity, and nightlife generate constant noise. Unlike visible forms of pollution such as litter or smog, noise pollution is often overlooked, yet its effects can be serious and long-lasting.

Exposure to high levels of noise over time can cause significant harm to physical health. Prolonged exposure to loud noise is one of the leading causes of hearing loss, which affects millions of people worldwide. Noise pollution has also been linked to cardiovascular problems, as constant noise can raise blood pressure and increase the risk of heart disease. Studies show that children who attend schools near airports or highways tend to have higher levels of stress hormones than those in quieter environments.

The effects of noise pollution are not limited to humans. Animals rely on sound for communication, navigation, and finding food. Excessive noise from ships and sonar equipment can disrupt the communication of marine mammals such as whales and dolphins. In urban areas, noise pollution can interfere with the ability of birds to sing and communicate, potentially affecting their reproduction and survival.

Reducing noise pollution requires action at both the individual and government level. Governments can set legal limits on acceptable noise levels and require construction and industrial sites to use noise-reducing equipment. Individuals can help by reducing unnecessary noise — for example, by keeping music at a reasonable volume and choosing quieter appliances. Urban planners can also help by designing cities with green spaces and sound barriers that absorb noise.`,

    { id:1, text:'According to the passage, how does noise pollution affect marine mammals?', options:['It causes them to migrate to colder regions earlier than usual.','It reduces the amount of food available in the ocean.','It can disrupt their communication, which relies on sound.','It forces them to spend more time near the surface of the water.'], correctAnswer:2, explanation:'第3段落に "Excessive noise from ships and sonar equipment can disrupt the communication of marine mammals such as whales and dolphins" とあります。正解は (3) です。' },

  level: 2, year: 2026, season: 'オリジナル', number: '長文問題 A',
  passageTitle: 'Saving Money',
  passage: `The ability to save money is one of the most important financial skills a person can develop. While it may seem straightforward, many people struggle to save consistently, often spending more than they earn. Financial experts argue that developing good saving habits early in life can have a profound impact on a person's financial security and quality of life in the long run.

One of the most effective strategies for saving money is to create a budget. A budget is a plan that outlines how much money a person earns and how it will be spent. By tracking income and expenses carefully, individuals can identify areas where they are spending unnecessarily and redirect that money toward savings. Financial advisers often recommend following the "50/30/20 rule": spending 50% of income on needs, 30% on wants, and saving the remaining 20%.

Another powerful saving strategy is automation. Many banks offer the option to automatically transfer a set amount of money to a savings account each month. Because the money is moved before it can be spent, this method removes the temptation to use it for discretionary purchases. Research shows that people who automate their savings are significantly more likely to reach their financial goals than those who save manually.

Beyond building a financial safety net, saving money provides people with freedom and options. Having savings allows people to handle unexpected expenses — such as medical bills or car repairs — without going into debt. It also makes it possible to pursue opportunities, such as starting a business, going back to school, or traveling, that would otherwise be out of reach. In this sense, saving money is ultimately about creating possibilities for the future.`,

  passageTitle: 'Helping Elderly Neighbors',
  passage: `As populations age in many countries, the number of elderly people living alone is growing. While many older adults value their independence and prefer to remain in their own homes rather than move to care facilities, living alone can present significant challenges. Simple everyday tasks — such as grocery shopping, household repairs, and attending medical appointments — can become difficult for those with limited mobility or health problems.

Encouraging a culture of neighborly support for the elderly requires awareness and commitment at the community level. Local governments, community centers, and religious organizations can play a role by organizing volunteer programs, raising awareness of the needs of elderly residents, and creating social spaces where older adults can interact with people of all ages. Building an inclusive community that values its elderly members is a responsibility shared by everyone.`,

  passageTitle: 'School Lunch Programs',
  passage: `School lunch programs provide meals to students during the school day, often at a subsidized or free cost for those from low-income families. These programs exist in many countries and are considered an important part of ensuring that all children have access to adequate nutrition. Well-nourished students are generally better able to concentrate, learn, and participate actively in school activities.

School lunch programs also play a role in promoting healthy eating habits. By offering balanced meals that include vegetables, fruits, protein, and whole grains, schools help children develop tastes for nutritious food from a young age. Some programs incorporate nutrition education into the curriculum, teaching students about the importance of a healthy diet. These lessons can influence eating habits throughout a child's life.

Despite their benefits, school lunch programs face challenges related to funding and food quality. Critics argue that budget constraints often force schools to rely on processed foods that are high in salt, sugar, and fat. Advocates for better school meals push for increased government investment to ensure that all children have access to fresh, nutritious food regardless of their family's income. They argue that spending on school nutrition is an investment in the health and future productivity of the next generation.`,

{
  id: 's-1-2026-1',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 A',
  passageTitle: 'The Future of Nuclear Fusion',
  passage: `Nuclear fusion — the process by which two light atomic nuclei combine to release enormous amounts of energy — has long been considered the "holy grail" of clean energy. Unlike nuclear fission, which splits heavy atoms and generates radioactive waste, fusion produces minimal long-lived radioactive byproducts and uses hydrogen isotopes as fuel, resources that are effectively inexhaustible. For decades, scientists have pursued this technology as a potential solution to the world's energy needs, but practical fusion power has always seemed to be "thirty years away."

Recent breakthroughs, however, suggest that fusion energy may be approaching viability. In December 2022, the National Ignition Facility in California achieved a landmark result: for the first time in history, a fusion reaction produced more energy than the laser energy used to trigger it. This milestone, known as "ignition," was celebrated worldwide as proof that fusion is scientifically possible, even if significant engineering challenges remain before it can generate electricity on a commercial scale.

The private sector has taken note of these advances and invested heavily in fusion research. Dozens of start-up companies, backed by billions of dollars in venture capital, are pursuing a variety of fusion approaches. Some are developing compact devices using magnetic confinement, while others are exploring alternative approaches such as inertial confinement or magnetized target fusion. The diversity of approaches increases the likelihood that at least one method will eventually yield a commercially viable reactor.

Critics caution that optimism should be tempered by the immense technical hurdles that remain. Sustaining a fusion reaction long enough and at sufficient scale to generate net electricity for the grid, while building reactors that are cost-competitive with renewable energy sources such as solar and wind, presents formidable challenges. Some analysts worry that the excitement surrounding recent achievements may attract investment away from already mature renewable technologies that could address climate change more immediately.

Nevertheless, the strategic importance of fusion energy cannot be overstated. If successfully developed, it could provide virtually unlimited, low-carbon electricity, fundamentally transforming global energy systems. Policymakers argue that the potential upside justifies parallel investment in both fusion research and existing renewables, positioning fusion as a long-term complement to, rather than a replacement for, current clean energy technologies.`,
  questions: [
    { id:0, text:'According to the passage, what distinguishes nuclear fusion from nuclear fission in terms of waste?', options:['Fusion produces more radioactive waste than fission but uses cheaper fuel.','Fusion generates minimal long-lived radioactive byproducts, unlike fission.','Fission uses hydrogen isotopes as fuel while fusion relies on uranium.','Both fusion and fission produce equivalent levels of radioactive waste.'], correctAnswer:1, explanation:'第1段落に "fusion produces minimal long-lived radioactive byproducts" とあります。正解は (2) です。' },
    { id:1, text:'What was the significance of the December 2022 result at the National Ignition Facility?', options:['It was the first time a fusion reactor was connected to a national electricity grid.','It demonstrated that fusion could replace all existing nuclear power plants.','A fusion reaction produced more energy than the laser energy used to trigger it, proving ignition.','Scientists finally created a fusion reactor that could operate without any maintenance.'], correctAnswer:2, explanation:'第2段落に "a fusion reaction produced more energy than the laser energy used to trigger it" とあります。正解は (3) です。' },
    { id:2, text:'What concern do critics raise about the current enthusiasm for fusion energy?', options:['They argue that fusion research is being conducted without adequate safety protocols.','They fear that excitement may divert investment from mature renewables that can address climate change sooner.','They believe that fusion reactors will produce more pollution than conventional power plants.','They claim that private companies should not be allowed to conduct fusion research.'], correctAnswer:1, explanation:'第4段落に "the excitement surrounding recent achievements may attract investment away from already mature renewable technologies that could address climate change more immediately" とあります。正解は (2) です。' },
    { id:3, text:'How do policymakers view the relationship between fusion energy and existing renewable technologies, according to the passage?', options:['Fusion should replace all renewable energy sources as soon as possible.','Investment in fusion is not justified until existing renewables prove insufficient.','Fusion should be developed as a long-term complement to current clean energy technologies.','Policymakers believe that only government agencies should invest in fusion research.'], correctAnswer:2, explanation:'第5段落に "positioning fusion as a long-term complement to, rather than a replacement for, current clean energy technologies" とあります。正解は (3) です。' }

{
  id: 's-1-2026-2',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 B',
  passageTitle: 'Land Degradation and Food Security',
  passage: `Land degradation — the decline in the quality of land due to human activity or natural processes — poses one of the most serious threats to global food security in the twenty-first century. Approximately one-third of the world's land surface has already been degraded, with soil erosion, salinization, deforestation, and overgrazing among the leading causes. The United Nations estimates that land degradation costs the global economy trillions of dollars annually in lost agricultural productivity and ecosystem services.

The relationship between land degradation and food insecurity is particularly acute in developing regions, where subsistence farmers rely directly on healthy soils for their livelihoods. As productive land becomes scarce, competition for fertile territory intensifies, sometimes contributing to social conflict and displacement. Climate change compounds the problem by increasing the frequency and severity of droughts, floods, and extreme weather events that accelerate soil deterioration.

Reversing land degradation requires a combination of technological innovation and traditional ecological knowledge. Sustainable land management practices — such as agroforestry, cover cropping, contour farming, and the restoration of degraded soils through organic matter additions — can restore productivity while reducing environmental impact. Indigenous communities in many parts of the world have long practiced sophisticated forms of land stewardship that modern agricultural science is beginning to recognize and incorporate.

International efforts to address land degradation have gained momentum in recent years. The United Nations Convention to Combat Desertification has set targets for achieving "land degradation neutrality" — a state in which the rate of land degradation is balanced by restoration efforts. However, critics argue that these targets remain aspirational without binding commitments and adequate financing from wealthy nations to support restoration efforts in developing countries.

The challenge of land degradation ultimately forces a reconsideration of the dominant paradigm of industrial agriculture, which prioritizes short-term yield maximization over long-term soil health. A transition toward more regenerative agricultural systems — ones that build soil organic matter, enhance biodiversity, and integrate ecological principles — is increasingly seen as essential not only for food security but also for climate change mitigation, as healthy soils represent a significant carbon sink.`,
  questions: [
    { id:0, text:'According to the passage, what is the estimated economic cost of land degradation globally?', options:['Billions of dollars annually in direct agricultural subsidies.','Trillions of dollars annually in lost agricultural productivity and ecosystem services.','Hundreds of millions of dollars in government-funded restoration programs.','Millions of dollars annually in emergency food aid to affected regions.'], correctAnswer:1, explanation:'第1段落に "land degradation costs the global economy trillions of dollars annually in lost agricultural productivity and ecosystem services" とあります。正解は (2) です。' },
    { id:1, text:'According to the passage, what role does climate change play in land degradation?', options:['Climate change directly causes the salinization of fertile agricultural soils.','It reduces the amount of rainfall in tropical regions, creating new deserts.','It increases the frequency and severity of extreme weather events that accelerate soil deterioration.','Climate change forces farmers to adopt new crops that further damage the soil.'], correctAnswer:2, explanation:'第2段落に "Climate change compounds the problem by increasing the frequency and severity of droughts, floods, and extreme weather events that accelerate soil deterioration" とあります。正解は (3) です。' },
    { id:2, text:'What is "land degradation neutrality" as described in the passage?', options:['A policy that prevents any new agricultural land from being developed.','A state in which the rate of land degradation is balanced by restoration efforts.','A system in which developed nations compensate developing countries for damaged land.','A target requiring all farmland to be converted to organic agriculture within twenty years.'], correctAnswer:1, explanation:'第4段落に "land degradation neutrality — a state in which the rate of land degradation is balanced by restoration efforts" とあります。正解は (2) です。' },
    { id:3, text:'What transition does the passage suggest is essential for both food security and climate change mitigation?', options:['A shift from small-scale farming to large-scale industrial agriculture.','Moving from subsistence farming to export-oriented agricultural production.','A transition toward regenerative agricultural systems that build soil health and biodiversity.','Replacing conventional crops with genetically modified varieties that resist drought.'], correctAnswer:2, explanation:'第5段落に "A transition toward more regenerative agricultural systems — ones that build soil organic matter, enhance biodiversity, and integrate ecological principles — is increasingly seen as essential" とあります。正解は (3) です。' }
  ]
},
{
  id: 's-1-2026-3',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 A',
  passageTitle: 'Global Water Scarcity',
  passage: `Water scarcity — defined as the condition in which demand for fresh water exceeds the available supply — is emerging as one of the defining crises of the twenty-first century. Despite the fact that water covers approximately 71 percent of the Earth's surface, less than 3 percent of the world's water is fresh, and only a fraction of that is accessible in rivers, lakes, and aquifers. Already, over two billion people live in countries experiencing high water stress, and projections suggest this number will rise dramatically as population growth, agricultural expansion, and climate change intensify pressure on freshwater resources.

Agriculture is by far the largest consumer of fresh water globally, accounting for approximately 70 percent of total withdrawals. Much of this water is used inefficiently through flood irrigation, which allows significant amounts to evaporate or run off before reaching crops. Improving agricultural water efficiency through drip irrigation, precision watering technologies, and drought-resistant crop varieties represents one of the most effective strategies for alleviating water scarcity without sacrificing food production.

Groundwater depletion presents a particularly alarming dimension of the water crisis. Many of the world's major agricultural regions — including parts of India, China, and the United States — rely heavily on fossil aquifers, underground reservoirs that accumulated over thousands of years and recharge far too slowly to keep pace with current extraction rates. Once depleted, these aquifers may never fully recover, leaving future generations without the water supplies that current agriculture takes for granted.

Urban water management presents its own set of challenges. Rapidly growing cities in developing countries often lack the infrastructure to deliver clean water reliably to all residents. Water loss through leaking pipes can account for 30 to 50 percent of municipal water supplies in some cities. In contrast, some cities are pioneering innovative approaches such as atmospheric water harvesting, wastewater recycling, and the restoration of urban wetlands to supplement conventional water supplies.

Addressing global water scarcity requires governance frameworks that recognize fresh water as both a human right and a finite natural resource requiring careful stewardship. International agreements on shared river basins and transboundary aquifers are essential to prevent conflict and ensure equitable distribution. Pricing water at its true economic and environmental cost, while protecting access for the poorest populations, remains one of the most politically contentious but potentially effective tools for promoting conservation.`,
  questions: [

{
  id: 's-1-2026-4',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 B',
  passageTitle: 'Sovereign Wealth Funds',
  passage: `Sovereign wealth funds (SWFs) are state-owned investment vehicles that manage pools of capital accumulated primarily from commodity export revenues, balance of payments surpluses, or fiscal surpluses. Unlike traditional central bank reserves, which are managed conservatively to ensure liquidity, SWFs typically pursue higher-risk, higher-return investment strategies across diverse global asset classes, including equities, bonds, real estate, and private equity. The largest funds, such as Norway's Government Pension Fund Global and Abu Dhabi's ADIA, each manage assets worth over one trillion dollars.

The stated purpose of most SWFs is to transform finite natural resource wealth into a diversified portfolio of financial assets that can sustain national prosperity for future generations. Norway's fund, for example, was established to ensure that revenues from North Sea oil benefit both present and future generations of Norwegians. This intergenerational equity rationale distinguishes SWFs from mere accumulations of foreign exchange reserves held for short-term stabilization purposes.

Despite their benign stated objectives, SWFs have attracted scrutiny from recipient countries concerned about the geopolitical implications of state-directed foreign investment. Critics worry that government-backed investors may pursue strategic rather than purely financial objectives — for example, acquiring stakes in critical infrastructure, advanced technology companies, or defense-related industries in ways that could compromise national security. Several countries have enacted legislation to screen and restrict foreign investment in sensitive sectors.

Transparency and governance standards vary considerably among SWFs. The Santiago Principles, a voluntary framework developed in 2008, established best practices for transparency, governance, and accountability. However, compliance remains uneven, and some funds — particularly those from authoritarian states — provide limited disclosure of their investment strategies, decision-making processes, and political links. This opacity fuels concerns about the misuse of public funds for private enrichment or political purposes.

As the global economy evolves, SWFs are increasingly being asked to align their investment strategies with sustainability objectives. Some funds have adopted exclusion lists to avoid investments in companies involved in tobacco, weapons, or fossil fuels, while others are integrating environmental, social, and governance criteria into their portfolio management. The extent to which these commitments reflect genuine conviction versus public relations strategy remains a matter of ongoing debate among analysts.`,

{
  id: 's-1-2026-5',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 A',
  passageTitle: 'The Digital Divide',
  passage: `The "digital divide" refers to the gap between individuals, communities, and nations that have meaningful access to digital technologies — including the internet, smartphones, and computers — and those that do not. While global internet connectivity has expanded rapidly over the past two decades, significant disparities persist along lines of geography, income, age, education, and gender. The COVID-19 pandemic starkly exposed the consequences of this divide, as school closures forced millions of students worldwide to rely on digital platforms for education, leaving those without connectivity severely disadvantaged.

Access to digital technology is increasingly treated as a prerequisite for full participation in modern social, economic, and civic life. Online platforms mediate access to employment, financial services, healthcare information, government services, and social relationships. Those excluded from digital networks face compounding disadvantages, as the growing digitization of essential services makes it progressively harder to navigate daily life without reliable internet access.

Bridging the digital divide requires addressing multiple layers of inequality. Physical infrastructure — laying fiber optic cables, building cell towers, and providing satellite connectivity to remote areas — is necessary but insufficient. Affordability is a critical barrier, as even where connectivity exists, many low-income households cannot afford the cost of devices and data plans. Digital literacy — the skills needed to use technology effectively and safely — represents a further dimension, as access to devices without the ability to use them productively provides limited benefit.

Policy responses to the digital divide range from government-subsidized broadband programs to public school laptop distribution initiatives and community digital literacy training. Some countries have declared internet access a legal right, while others rely on private-sector competition to drive down costs and expand coverage. Public-private partnerships have shown promise in some contexts, though critics argue that market-driven approaches tend to prioritize profitable urban markets over underserved rural and low-income communities.

The digital divide is not merely a technical problem but a reflection of deeper structural inequalities in access to education, infrastructure, and economic opportunity. Addressing it sustainably requires confronting these underlying disparities rather than simply deploying technology. Without deliberate effort to ensure that digital transformation is inclusive, the digitization of society risks entrenching and amplifying existing forms of social exclusion.`,

    { id:0, text:'According to the passage, how did the COVID-19 pandemic relate to the digital divide?', options:['The pandemic accelerated internet infrastructure development in developing countries.','School closures revealed the severe disadvantages faced by students without digital access.','The pandemic caused a temporary reduction in global internet usage.','COVID-19 demonstrated that digital technology is not suitable for educational purposes.'], correctAnswer:1, explanation:'第1段落に "school closures forced millions of students worldwide to rely on digital platforms for education, leaving those without connectivity severely disadvantaged" とあります。正解は (2) です。' },

{
  id: 's-1-2026-6',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 B',
  passageTitle: 'Income Inequality and Social Mobility',
  passage: `Income inequality — the unequal distribution of earnings and wealth across a population — has widened significantly in most advanced economies since the 1980s. The share of total income captured by the top one percent has reached levels not seen since the early twentieth century in several countries, while wage growth for middle- and lower-income workers has stagnated. Economists debate the causes of this trend, pointing variously to technological change, globalization, declining union membership, and tax policies that favor capital over labor.

A particularly concerning dimension of rising inequality is its effect on social mobility — the ability of individuals to improve their economic standing relative to the position into which they were born. Contrary to the popular belief that societies with high inequality are dynamic and meritocratic, empirical research has found a negative correlation between income inequality and intergenerational mobility, a relationship sometimes visualized as the "Great Gatsby Curve." Put simply, children born into disadvantaged circumstances in highly unequal societies face significantly lower odds of achieving upward mobility than their counterparts in more equal societies.

The mechanisms linking inequality to reduced mobility operate through multiple channels. Wealthy families invest heavily in children's education, health, and social networks, providing advantages that compound over generations. Public schools in low-income areas typically receive less funding and offer fewer opportunities than those in wealthy neighborhoods. Access to higher education — a critical pathway to economic advancement — is constrained by rising costs, creating a situation in which educational credentials increasingly correlate with family wealth rather than individual talent or effort.

Policy responses to inequality and mobility tend to cluster around redistribution through taxation and public spending, investment in human capital such as early childhood education and job training, and labor market reforms to strengthen workers' bargaining power. The evidence on effective interventions is clearest for early childhood programs, which have been shown to produce substantial and lasting improvements in cognitive development, educational attainment, and lifetime earnings for children from disadvantaged backgrounds.

Critics of aggressive redistribution argue that high marginal tax rates dampen investment and entrepreneurship, potentially sacrificing long-term growth. However, a growing body of research challenges the assumption that equality and economic efficiency are inevitably in tension, suggesting instead that extreme inequality itself impairs economic performance by reducing aggregate demand, misallocating talent, and undermining the social trust and institutional quality on which productive market economies depend.`,

    { id:0, text:'According to the passage, what does the "Great Gatsby Curve" represent?', options:['A theory explaining why wealthy individuals tend to spend more on luxury goods.','The relationship between income inequality and reduced intergenerational social mobility.','A historical account of income distribution in early twentieth-century America.','A model showing how globalization affects wage growth in advanced economies.'], correctAnswer:1, explanation:'第2段落に "a negative correlation between income inequality and intergenerational mobility, a relationship sometimes visualized as the Great Gatsby Curve" とあります。正解は (2) です。' },

{
  id: 's-1-2026-7',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 A',
  passageTitle: 'Precision Agriculture',
  passage: `Precision agriculture refers to a set of technologies and practices that use data, sensors, and digital tools to optimize farm management at a highly granular level. Rather than applying inputs such as water, fertilizer, and pesticides uniformly across an entire field, precision agriculture enables farmers to tailor applications to the specific needs of different zones within a field based on real-time data. Technologies driving this transformation include GPS-guided machinery, remote sensing via drones and satellites, soil moisture sensors, and AI-powered data analytics platforms.

The potential benefits of precision agriculture are substantial. By applying inputs more efficiently, farmers can significantly reduce costs while maintaining or even increasing yields. Reducing the overuse of fertilizers and pesticides also has important environmental benefits, including decreased runoff into waterways and lower greenhouse gas emissions from agricultural soils. Studies suggest that precision irrigation alone can reduce water use by 30 to 50 percent compared to conventional flood irrigation, a significant advantage in water-scarce regions.

The adoption of precision agriculture technologies is growing rapidly in high-income countries, particularly among large commercial farming operations that have the capital to invest in the required equipment and expertise. However, the technology gap between large and small farms raises equity concerns. Smallholder farmers, who produce a substantial share of the world's food, often lack access to credit, digital infrastructure, and the technical knowledge required to adopt these technologies, potentially widening the productivity gap between large commercial operations and subsistence-scale farms.

Bridging this gap is a priority for agricultural development organizations and governments in developing countries. Innovative models such as "agriculture as a service," in which technology providers offer precision agriculture capabilities on a subscription basis or through cooperatives, are being piloted to extend the benefits to smaller operations. Mobile phone-based platforms that deliver localized agronomic advice to smallholder farmers represent a lower-tech but potentially impactful application of data-driven agriculture.

Despite its promise, precision agriculture is not a panacea. It is most effective when integrated within a broader strategy that includes sustainable soil management, crop diversity, and consideration of social and ecological context. Concerns also exist about data ownership and privacy, as the detailed farm-level data collected by precision agriculture systems can be commercially valuable, raising questions about who controls and benefits from this information.`,

    { id:0, text:'According to the passage, what is the fundamental principle of precision agriculture that distinguishes it from conventional farming?', options:['Using only organic fertilizers and pesticides to reduce environmental harm.','Applying farm inputs uniformly across entire fields to ensure consistent crop quality.','Tailoring the application of inputs to specific zones within a field based on real-time data.','Replacing human labor entirely with fully automated robotic systems.'], correctAnswer:2, explanation:'第1段落に "precision agriculture enables farmers to tailor applications to the specific needs of different zones within a field based on real-time data" とあります。正解は (3) です。' },

{
  id: 's-1-2026-8',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 B',
  passageTitle: 'Child Labor in Global Supply Chains',
  passage: `Child labor — defined by the International Labour Organization as work that deprives children of their childhood, their potential, and their dignity, and that is harmful to physical and mental development — remains a pervasive global problem despite decades of international efforts to eliminate it. According to ILO estimates, approximately 160 million children worldwide are engaged in child labor, with the highest concentrations in sub-Saharan Africa and South Asia. Agriculture accounts for the largest share, employing approximately 70 percent of child laborers, often in hazardous conditions involving exposure to chemicals, heavy machinery, and extreme weather.

The persistence of child labor is rooted in a complex web of economic, social, and institutional factors. Poverty is the primary driver: in households where adult incomes are insufficient to meet basic needs, children's labor contributions may represent an economic necessity. Weak enforcement of labor laws, inadequate access to quality education, and deeply embedded cultural norms in some communities also contribute to perpetuating the practice. When schools are distant, unaffordable, or of poor quality, the opportunity cost of attending school rather than working is seen as prohibitively high by many families.

Global supply chains have brought the issue of child labor to the attention of consumers and corporations worldwide. Major brands in industries including apparel, electronics, cocoa, and tobacco have faced public scrutiny and reputational damage over the use of child labor by their suppliers. In response, many multinational companies have adopted codes of conduct, supply chain auditing programs, and supplier training initiatives intended to eliminate child labor from their operations. Critics, however, argue that these measures are often superficial, as audits can be manipulated and rarely address the root causes of the problem.

More promising approaches combine supply chain accountability with investment in the social and economic conditions that drive child labor. Community-based programs that provide cash transfers to poor families conditional on school attendance have shown significant effectiveness in reducing child labor in several countries. Access to quality education — both increasing availability and improving relevance and quality — is widely regarded as the most sustainable long-term solution, as it raises the perceived value of education relative to work for children and their families.

The Sustainable Development Goals include a specific target to end all forms of child labor by 2025, a deadline that will clearly be missed. Achieving lasting progress will require sustained political commitment, international cooperation, and the recognition that child labor cannot be eliminated in isolation from the broader agenda of poverty reduction, educational development, and the promotion of decent work for adults.`,
  questions: [
    { id:0, text:'According to the passage, what sector employs the largest proportion of child laborers worldwide?', options:['Manufacturing, particularly in garment factories in South Asia.','Mining, especially in artisanal gold and diamond mines in sub-Saharan Africa.','Agriculture, accounting for approximately 70 percent of child laborers.','Domestic service within private households in urban areas.'], correctAnswer:2, explanation:'第1段落に "Agriculture accounts for the largest share, employing approximately 70 percent of child laborers" とあります。正解は (3) です。' },

    { id:2, text:'What criticism does the passage make of supply chain auditing programs used by multinational companies?', options:['Auditing programs are too expensive for small and medium-sized companies to implement.','Audits can be manipulated and rarely address the root causes of child labor.','Auditing companies lack the technical expertise to identify child laborers in complex supply chains.','Supply chain audits violate the sovereignty of developing countries by imposing foreign standards.'], correctAnswer:1, explanation:'第3段落に "audits can be manipulated and rarely address the root causes of the problem" とあります。正解は (2) です。' },

  ]
},
{
  id: 's-1-2026-9',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 A',
  passageTitle: 'The Gig Economy',
  passage: `The "gig economy" refers to a labor market characterized by short-term contracts and freelance work as opposed to permanent employment. Enabled by digital platforms such as Uber, Airbnb, Deliveroo, and Upwork, the gig economy has grown dramatically over the past decade, fundamentally altering the relationship between workers and employers. Proponents argue that gig work offers workers unprecedented flexibility and autonomy, allowing them to set their own hours, choose their clients, and balance work with other life priorities. Critics, however, contend that this flexibility comes at the cost of the protections and benefits that traditional employment provides.

The legal status of gig workers sits at the center of intense regulatory debate. Most platforms classify their workers as independent contractors rather than employees, a categorization that relieves the platforms of responsibility for providing minimum wage guarantees, overtime pay, social security contributions, health insurance, and other standard employment benefits. Courts in several countries have challenged this classification, ruling in some cases that gig workers should be entitled to employee protections. The United Kingdom's Supreme Court, for example, ruled in 2021 that Uber drivers are workers rather than self-employed contractors, entitling them to minimum wage and holiday pay.

The economic implications of the gig economy are complex and contested. While some workers use gig platforms to supplement income from primary employment and genuinely value the flexibility, research suggests that a significant proportion of gig workers rely on platform income as their primary source of livelihood and earn below the equivalent of minimum wage when hours worked, platform fees, and the costs of self-employment are factored in. Income volatility — the irregular and unpredictable nature of gig earnings — poses particular challenges for financial planning, access to credit, and long-term economic security.

Platform companies argue that the efficiencies and innovations created by gig platforms benefit not only workers and consumers but the broader economy. They contend that regulation mandating traditional employment relationships would destroy the flexibility that many workers value and undermine the business model that enables affordable, on-demand services. This framing has proven influential in some regulatory contexts, though labor advocates counter that public subsidization of basic needs for insufficiently compensated workers effectively amounts to a subsidy for platform companies' profits.

Policymakers worldwide are grappling with how to adapt labor market frameworks designed for the industrial era to the realities of platform-mediated work. Several countries and jurisdictions are experimenting with new categories of worker — "dependent contractors" or "workers" — that occupy a middle ground between employee and self-employed status, providing some protections without requiring the full range of employer obligations. Whether these hybrid approaches can adequately address the precarity of gig work while preserving its genuine benefits remains to be seen.`,
  questions: [
    { id:0, text:'According to the passage, why do gig platforms classify their workers as independent contractors rather than employees?', options:['Independent contractors tend to provide higher-quality service to customers.','This classification relieves platforms of responsibility for providing wages, benefits, and social security contributions.','Platform algorithms are designed to work more efficiently with contractors than with employees.','Independent contractors are willing to work for lower wages than traditional employees.'], correctAnswer:1, explanation:'第2段落に "a categorization that relieves the platforms of responsibility for providing minimum wage guarantees...and other standard employment benefits" とあります。正解は (2) です。' },
    { id:1, text:'According to the passage, what financial challenge does income volatility pose for gig workers?', options:['Gig workers face higher income tax rates than traditional employees.','Income volatility makes it difficult to save money because all earnings must be reinvested.','The irregular and unpredictable nature of earnings poses challenges for financial planning and access to credit.','Platform fees cause gig workers to earn significantly less than they report to tax authorities.'], correctAnswer:2, explanation:'第3段落に "Income volatility — the irregular and unpredictable nature of gig earnings — poses particular challenges for financial planning, access to credit, and long-term economic security" とあります。正解は (3) です。' },
    { id:2, text:'What argument do labor advocates make in response to platform companies\' claims about flexibility, according to the passage?', options:['Labor advocates argue that gig platforms should be nationalized to ensure fair treatment of workers.','They contend that flexibility benefits platforms more than workers who depend on gig income.','They argue that public subsidization of basic needs for insufficiently paid workers effectively subsidizes platform profits.','Labor advocates claim that gig workers are more productive than traditional employees.'], correctAnswer:2, explanation:'第4段落に "public subsidization of basic needs for insufficiently compensated workers effectively amounts to a subsidy for platform companies\' profits" とあります。正解は (3) です。' },
    { id:3, text:'According to the passage, what approach are several countries experimenting with to address the legal status of gig workers?', options:['Requiring all gig platforms to convert their workers to full employees within five years.','Banning platform-based work that does not meet minimum standards for employment benefits.','Creating new intermediate worker categories that provide some protections without full employer obligations.','Establishing government-run gig platforms to compete with and regulate private platforms.'], correctAnswer:2, explanation:'第5段落に "experimenting with new categories of worker — "dependent contractors" or "workers" — that occupy a middle ground between employee and self-employed status, providing some protections" とあります。正解は (3) です。' }

{
  id: 's-1-2026-10',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 B',
  passageTitle: 'Vaccine Hesitancy',
  passage: `Vaccine hesitancy — the reluctance or refusal to vaccinate despite the availability of vaccines — was identified by the World Health Organization as one of the ten greatest threats to global health in 2019, a designation that gained renewed urgency during the COVID-19 pandemic. While the scientific consensus on vaccine safety and efficacy is overwhelming, a significant minority of the population in many countries expresses doubts about or opposition to vaccination, influenced by a complex mix of psychological, social, cultural, and political factors.

Research into the psychology of vaccine hesitancy has identified several key drivers. Distrust of pharmaceutical companies and government health authorities, often rooted in historical experiences of medical abuse or perceived conflicts of interest, is a significant factor in many communities. The availability heuristic — the tendency to overweight vivid, anecdotal accounts of adverse vaccine events relative to abstract statistical evidence of benefit — can make rare side effects seem more threatening than the diseases vaccines prevent. Misinformation and conspiracy theories, amplified by social media, have further eroded public confidence in vaccines among susceptible populations.

The social dimensions of vaccine hesitancy are as significant as its psychological roots. Vaccination decisions are rarely made in isolation; they are shaped by the norms and behaviors of social networks, communities, and trusted sources of authority. In some communities, religious or cultural beliefs about the body, natural immunity, or divine protection intersect with hesitancy in complex ways. Political polarization has increasingly mapped onto vaccine attitudes in some countries, with vaccination becoming a marker of political identity rather than a purely medical decision.

Public health communicators have learned that confrontational approaches — aggressively debunking misinformation or belittling those who express doubts — tend to backfire, entrenching resistance rather than reducing it. More effective strategies include motivational interviewing, in which health workers engage vaccine-hesitant individuals in non-judgmental, open-ended conversations that acknowledge concerns and gently explore them. Community-level interventions that leverage trusted local messengers — religious leaders, community elders, respected healthcare workers — have shown particular promise in reaching hesitant populations.

The broader challenge posed by vaccine hesitancy extends beyond individual vaccination decisions. Herd immunity — the indirect protection offered to unvaccinated individuals when a sufficient proportion of the population is immune — depends on achieving vaccination coverage thresholds that hesitancy can put out of reach. Outbreaks of measles and other vaccine-preventable diseases in communities with significant hesitancy demonstrate that the consequences of declining vaccination rates are not limited to the individuals who refuse vaccination but can ripple throughout the population.`,
  questions: [
    { id:0, text:'According to the passage, what is the "availability heuristic" in the context of vaccine hesitancy?', options:['The tendency to believe vaccines are more effective when they are widely available.','The tendency to overweight vivid, anecdotal accounts of side effects relative to statistical evidence of benefit.','A cognitive bias that leads people to trust information from sources they encounter frequently.','The tendency to assume that vaccines available in pharmacies are safer than those given in hospitals.'], correctAnswer:1, explanation:'第2段落に "The availability heuristic — the tendency to overweight vivid, anecdotal accounts of adverse vaccine events relative to abstract statistical evidence of benefit" とあります。正解は (2) です。' },

    { id:2, text:'According to the passage, why do confrontational approaches to vaccine hesitancy tend to be ineffective?', options:['Confrontational methods are too expensive for public health departments to implement.','Aggressively debunking misinformation tends to entrench resistance rather than reduce it.','Confrontational approaches work only for highly educated populations and not for others.','Such approaches require too much time per individual to be practical at a population level.'], correctAnswer:1, explanation:'第4段落に "confrontational approaches...tend to backfire, entrenching resistance rather than reducing it" とあります。正解は (2) です。' },

  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 A',
  passageTitle: 'Deep-Sea Mining',
  passage: `Deep-sea mining refers to the extraction of mineral resources from the ocean floor, typically at depths exceeding 200 meters. Interest in this nascent industry has grown substantially in recent years, driven by the discovery of vast deposits of polymetallic nodules, seafloor massive sulfides, and cobalt-rich ferromanganese crusts that contain valuable metals including cobalt, nickel, manganese, and copper. These minerals are critical components of batteries used in electric vehicles and energy storage systems, and demand for them is projected to surge as the global economy transitions away from fossil fuels.

Proponents of deep-sea mining argue that terrestrial mineral deposits are becoming increasingly scarce and difficult to access, and that deep-sea resources could supplement or replace them. They also contend that deep-sea mining may have a smaller environmental footprint than land-based mining, which frequently involves the displacement of communities, deforestation, and severe water pollution. Some proponents further argue that accessing domestic seabed resources could reduce certain nations' dependence on mineral imports from geopolitically sensitive regions.

Critics, however, raise serious concerns about the ecological impacts of deep-sea mining. The deep ocean is home to extraordinary biodiversity, including thousands of species that have not yet been scientifically described. Deep-sea ecosystems are characterized by extreme environmental stability and species that have adapted to those conditions over millions of years. Mining operations would physically destroy the seabed, generate sediment plumes that can travel thousands of kilometers, and produce noise pollution that may disturb marine mammals. Scientists warn that ecosystem recovery, if it occurs at all, would take centuries to millennia.

The regulatory framework for deep-sea mining is overseen by the International Seabed Authority (ISA), a United Nations body that manages the "common heritage of mankind" — the resources of the international seabed area beyond national jurisdiction. The ISA has issued exploration licenses to numerous companies and state entities, but as of the mid-2020s, has not yet finalized the regulations needed to authorize commercial extraction. A growing number of countries, scientists, and civil society organizations have called for a moratorium on deep-sea mining until the ecological risks are better understood.

The deep-sea mining debate illustrates the broader tension between the material requirements of green energy transitions and the imperative to protect planetary biodiversity. If the shift to renewable energy is to be genuinely sustainable, it cannot simply transfer environmental harm from carbon emissions to ocean floor destruction. Advocates for a "circular economy" approach argue that improved recycling of existing minerals and more efficient use of materials in battery technology could significantly reduce the demand for newly mined resources, potentially avoiding the need for deep-sea mining altogether.`,

  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 B',
  passageTitle: 'Cultural Heritage Preservation',
  passage: `Cultural heritage — encompassing tangible assets such as monuments, artifacts, and historic buildings, as well as intangible elements such as languages, traditions, and performing arts — represents humanity's accumulated identity and memory. The preservation of cultural heritage is increasingly recognized not merely as a nostalgic impulse but as a critical component of sustainable development, social cohesion, and economic vitality. However, heritage faces threats on multiple fronts, including armed conflict, urbanization, climate change, unsustainable tourism, and the inexorable passage of time.

Armed conflict poses one of the most acute and visible threats to cultural heritage. The deliberate targeting of cultural sites by combatants — as seen in the destruction of ancient Palmyra in Syria, the demolition of the Buddhas of Bamiyan in Afghanistan, and the looting of Iraqi museums — reflects a strategic intent to erase the cultural identity of opposing groups. UNESCO and other international bodies have worked to document threatened heritage, support post-conflict reconstruction, and prosecute cultural property crimes as violations of international humanitarian law, though enforcement remains inconsistent.

Climate change is emerging as a pervasive and long-term threat to both tangible and intangible heritage. Rising sea levels threaten low-lying historic cities and archaeological sites in coastal regions. Increased frequency of storms, floods, and wildfires places built heritage at heightened risk. Less visibly, shifting climatic conditions alter the ecosystems and environments that give context and meaning to intangible cultural practices — changing migration patterns, reduced biodiversity, and disrupted seasonal cycles can erode indigenous knowledge systems and traditional practices that have evolved in specific ecological contexts.

The economics of cultural heritage preservation are complex. While preservation requires substantial investment, cultural heritage generates significant economic returns through heritage tourism, the cultural and creative industries, and the premium that historic character adds to urban real estate. Cities that have invested in heritage conservation — such as Bologna in Italy, Luang Prabang in Laos, and George Town in Malaysia — have often achieved striking reversals of urban decline. Yet the benefits of heritage tourism can be undermined by over-tourism, which causes physical degradation of sites and displaces local communities whose living culture is the very substance of the heritage being promoted.

The digital revolution offers both new tools and new risks for cultural heritage. High-resolution 3D scanning, digital archiving, and virtual reality can document and make accessible heritage that would otherwise be inaccessible or at risk of loss. However, digital surrogates raise questions about authenticity and the irreplaceable quality of direct encounter with original artifacts and places. Moreover, digital platforms that transmit cultural content globally can accelerate the homogenization of cultural expression, potentially undermining the local distinctiveness that gives cultural heritage its value.`,

    { id:0, text:'According to the passage, why is the deliberate targeting of cultural sites in armed conflict considered particularly significant?', options:['Cultural sites are often used as military bases, making them legitimate targets under international law.','Destroying cultural sites is the most cost-effective strategy for defeating an opposing military force.','It reflects a strategic intent to erase the cultural identity of opposing groups.','Cultural sites contain valuable artifacts that can be sold to fund military operations.'], correctAnswer:2, explanation:'第2段落に "reflects a strategic intent to erase the cultural identity of opposing groups" とあります。正解は (3) です。' },
    { id:1, text:'According to the passage, how does climate change threaten intangible cultural heritage?', options:['Rising temperatures destroy physical artifacts stored in museums and cultural institutions.','Changing climatic conditions alter ecosystems that give context to intangible practices, eroding indigenous knowledge.','Climate change forces cultural communities to relocate, causing them to abandon traditional crafts.','Increased rainfall causes flooding that damages traditional manuscripts and written cultural records.'], correctAnswer:1, explanation:'第3段落に "shifting climatic conditions alter the ecosystems and environments that give context and meaning to intangible cultural practices...can erode indigenous knowledge systems and traditional practices" とあります。正解は (2) です。' },

{
  id: 's-1-2026-13',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 A',
  passageTitle: 'Neurotechnology and Brain Privacy',
  passage: `Neurotechnology — a broad category of devices and techniques that interact with the nervous system to monitor, stimulate, or decode neural activity — is advancing at a pace that is rapidly outstripping the ethical and legal frameworks designed to govern it. From consumer electroencephalogram headsets that claim to detect focus and stress levels to medical-grade brain-computer interfaces that allow paralyzed individuals to control prosthetic limbs through thought alone, the spectrum of neurotechnological applications is expanding into everyday life. The ability to read brain signals raises profound questions about mental privacy, autonomy, and the integrity of the self.

The commercial application of neurotechnology is already generating controversy. Neuromarketing companies use brain imaging data to analyze consumer responses to products and advertisements, raising concerns about manipulation that bypasses conscious deliberation. Employers in some sectors have explored neurotechnology to monitor workers' attention and cognitive states. In educational settings, some institutions have experimented with devices that track students' concentration levels, ostensibly to optimize learning but with significant implications for surveillance and the coercive use of physiological data.

The data generated by neurotechnology is uniquely sensitive. Unlike behavioral data, which can reflect choices and constructed self-presentation, neural data captures involuntary physiological processes that may reveal emotions, preferences, and mental states that individuals themselves may not be aware of or wish to disclose. The potential for this data to be used for discriminatory purposes — by insurers, employers, or law enforcement — is substantial. Brain data could theoretically be used to predict criminal behavior, assess creditworthiness, or make employment decisions on the basis of cognitive profiles rather than demonstrated capability.

Legal frameworks have been slow to respond to these challenges. General data protection regulations, such as the European Union's GDPR, provide some protection for biometric data, but their application to neural data is unclear and contested. A small number of jurisdictions — most notably Chile, which amended its constitution in 2021 — have enacted explicit legal protections for "neurorights," establishing principles such as mental integrity, cognitive liberty, and the right to mental privacy. International coordination on neurorights standards remains at an early stage.

Scientists and ethicists argue that proactive governance of neurotechnology is essential to prevent the emergence of a "neurocapitalism" in which inner cognitive states become commodities to be extracted and monetized. Key principles proposed for neurotechnology governance include data minimization, purpose limitation, informed consent, and the right to cognitive self-determination. Ensuring that neurotechnological benefits — particularly their enormous potential in treating neurological and psychiatric conditions — are not foreclosed by failures of governance requires urgent, inclusive, and anticipatory policy development.`,

{
  id: 's-1-2026-14',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 B',
  passageTitle: 'Corporate Tax Avoidance',
  passage: `Corporate tax avoidance — the use of legal means to minimize a company's tax liability, typically by exploiting mismatches and loopholes in national and international tax rules — has emerged as a significant issue in global economic governance. Unlike tax evasion, which involves illegal concealment of income or assets, tax avoidance operates within the letter, if not the spirit, of the law. Multinational corporations have employed a range of sophisticated strategies — including transfer pricing manipulation, profit shifting to low-tax jurisdictions, and the use of intellectual property holding structures — to dramatically reduce the tax they pay in the countries where they generate most of their revenues.

The scale of corporate tax avoidance is substantial. Estimates from academic researchers and the OECD suggest that global tax base erosion and profit shifting (BEPS) costs governments between 100 and 240 billion dollars annually, equivalent to 4 to 10 percent of global corporate income tax revenues. Developing countries are disproportionately affected, as they tend to rely more heavily on corporate tax revenues as a share of total government receipts and have less capacity to challenge multinational tax structures through complex litigation.

The international response to corporate tax avoidance has gathered momentum, most notably through the OECD's BEPS project and the subsequent agreement in 2021 on a global minimum corporate tax rate of 15 percent. This landmark agreement, endorsed by over 130 countries, aims to establish a floor beneath which effective corporate tax rates cannot fall, curbing the "race to the bottom" in corporate taxation that has seen statutory rates decline from an average of approximately 40 percent in the 1980s to around 23 percent today. Implementation has proven politically contentious, however, particularly with respect to the treatment of large multinational corporations and the reallocation of taxing rights between developed and developing nations.

Critics of the current tax avoidance framework focus not only on fiscal losses but on systemic economic distortions. When large multinationals pay minimal taxes, smaller domestic companies that cannot access international tax structures face competitive disadvantages. The effective tax rate for small and medium enterprises is often significantly higher than for large corporations, creating a tax system that is structurally regressive in its corporate dimension. This inverts the commonly held principle that tax systems should be broadly progressive.

The debate over corporate taxation ultimately engages fundamental questions about the role of corporations in society and the obligations they owe to the communities in which they operate. Beyond legal compliance, a growing movement for "tax responsibility" argues that corporations have an ethical duty to pay taxes at levels commensurate with their economic activity in each jurisdiction. Institutional investors, civil society organizations, and some national governments are increasingly incorporating tax transparency and tax justice criteria into their assessments of corporate governance and social responsibility.`,

{
  id: 's-1-2026-15',
  level: 1, year: 2026, season: 'オリジナル', number: '長文問題 A',
  passageTitle: 'Pandemic Preparedness',
  passage: `The COVID-19 pandemic exposed profound gaps in the world's capacity to detect, prevent, and respond to infectious disease outbreaks. Despite warnings from scientists and public health experts — and despite the experience of SARS, MERS, Ebola, and other recent epidemic threats — the international community was largely unprepared for a rapidly spreading respiratory pathogen with a high burden of asymptomatic transmission. The result was catastrophic: millions of deaths, unprecedented economic disruption, and deep social and psychological harm that will take decades to fully assess.

At the national level, gaps in pandemic preparedness were multidimensional. Many countries lacked adequate stockpiles of personal protective equipment, ventilators, and essential medicines. Public health surveillance systems were fragmented and underfunded, limiting the ability to detect and characterize emerging threats quickly. Healthcare workforce shortages, exacerbated by decades of underinvestment, constrained response capacity in both high- and low-income settings. Pandemic preparedness exercises, when conducted at all, often failed to anticipate the scale or duration of a sustained global crisis.

The global architecture for pandemic response also revealed critical weaknesses. The World Health Organization's authority and resources were deemed insufficient for the scale of the challenge it faced. The International Health Regulations — the framework governing states' obligations to report and respond to public health emergencies — lacked effective enforcement mechanisms and relied on voluntary compliance that proved fragile under the pressures of national self-interest. Vaccine distribution illustrated stark inequities, as wealthy nations secured the vast majority of initial vaccine supplies while low-income countries waited months or years for adequate doses.

In the aftermath of COVID-19, negotiations at the WHO and in other multilateral forums have centered on developing a new international pandemic treaty intended to address these gaps. Key elements under discussion include binding obligations for health data sharing, coordinated early warning systems, equitable access mechanisms for vaccines and therapeutics, and sustainable financing for pandemic preparedness activities. Progress has been slow, however, reflecting the persistent tension between national sovereignty over health policy and the imperative of collective international action in the face of shared biological threats.

Building genuine pandemic resilience requires investment across multiple domains simultaneously: strengthening primary healthcare, expanding domestic manufacturing capacity for vaccines and medicines in low-income regions, developing broad-spectrum antiviral medicines and flexible vaccine platforms, and enhancing One Health approaches that address the human-animal-environment interface at which most pandemic pathogens emerge. Above all, it requires translating the painful lessons of COVID-19 into durable institutional commitments before the memory of crisis fades and political will erodes.`,
  questions: [

    passageTitle: 'The Rise of Urban Farming',
    passage: `Cities around the world are increasingly embracing urban farming as a solution to food security challenges. From rooftop gardens in New York to vertical farms in Singapore, these innovative approaches to agriculture are transforming how urban residents think about food production.

Urban farming encompasses a wide range of activities, from small community gardens to large-scale indoor vertical farms. These operations can produce a variety of crops, including vegetables, herbs, and even fish through aquaponics systems. In many cities, unused spaces such as abandoned lots, parking structures, and building rooftops have been converted into productive growing areas.

The benefits of urban farming extend beyond simply providing fresh produce. Studies have shown that community gardens improve mental health by offering residents a connection to nature and opportunities for social interaction. In densely populated cities, these green spaces also help reduce the urban heat island effect, where cities tend to be significantly warmer than surrounding rural areas due to the abundance of heat-absorbing surfaces like concrete and asphalt.

However, urban farming faces significant challenges. The cost of urban land makes large-scale operations economically difficult, and soil contamination in some urban areas can make traditional ground-level farming unsafe without extensive testing and remediation. Water usage is another concern, as conventional farming methods can be inefficient in resource-limited urban environments.

Despite these obstacles, technological advances are helping urban farmers overcome many limitations. LED lighting systems allow crops to be grown in enclosed spaces without natural sunlight, while hydroponic and aeroponic systems reduce water usage by up to 90% compared to conventional soil-based farming. These innovations are making urban farming increasingly viable as both a commercial enterprise and a community resource.`,

    level: 2, year: 2023, season: '第2回', number: '長文問題 B',
    passageTitle: 'The Science of Sleep',
    passage: `Sleep is one of the most fundamental biological processes, yet its exact purpose remained a mystery to scientists for many years. Recent advances in neuroscience have shed new light on why humans and most animals spend roughly one-third of their lives in this state of reduced consciousness.

For decades, researchers believed that sleep primarily served as a period of rest and recovery for the body. While this is partially true—muscles repair themselves and the immune system strengthens during sleep—scientists have discovered that the brain undergoes equally important processes during this time. One of the most significant discoveries concerns the glymphatic system, a network of channels in the brain that becomes particularly active during sleep.

The glymphatic system functions as the brain's waste-clearance mechanism. During sleep, cerebrospinal fluid flows through these channels, flushing out toxic proteins and cellular waste products that accumulate during waking hours. Among the substances removed is beta-amyloid, a protein associated with Alzheimer's disease. This finding has led researchers to hypothesize that chronic sleep deprivation may contribute to the development of neurodegenerative diseases by preventing adequate clearance of these harmful substances.

Sleep is also essential for memory consolidation. During the rapid eye movement (REM) stage, the brain processes and organizes experiences from the day, transferring information from short-term to long-term memory storage. Studies with both humans and animals have demonstrated that sleep deprivation significantly impairs the ability to learn and retain new information.

The implications of these findings extend to public health policy. In many modern societies, chronic sleep deprivation has become increasingly common due to demanding work schedules, increased screen time, and other lifestyle factors. Health authorities have begun to emphasize that adequate sleep—typically seven to nine hours for adults—should be considered as important as proper nutrition and regular exercise for maintaining overall health.`,

    passageTitle: 'The Malleability of Human Memory',
    passage: `For much of the twentieth century, scientists and legal professionals alike operated under the assumption that human memory functions like a video recorder, faithfully capturing and storing experiences for later playback. This view has been fundamentally challenged by decades of research in cognitive psychology, which has demonstrated that memory is far more reconstructive than reproductive in nature.

The pioneering work of cognitive psychologist Elizabeth Loftus has been particularly influential in reshaping our understanding of memory. Through a series of landmark experiments conducted in the 1970s, Loftus demonstrated that eyewitness memories could be altered through the introduction of misleading post-event information. In one famous study, participants who witnessed a simulated car accident were asked leading questions implying either a stop sign or a yield sign was present. When later asked to recall what they had seen, many participants reported seeing the sign suggested in the question, even when it contradicted what they had actually witnessed.

This phenomenon, known as the misinformation effect, has profound implications for the legal system. Research suggests that eyewitness testimony, long considered highly reliable, can be significantly distorted by factors ranging from the wording of police interview questions to media coverage of a crime. Studies have found that a substantial proportion of wrongful convictions in the United States involved eyewitness misidentification, highlighting the potentially devastating consequences of memory's malleability.

Memory researchers have also identified source monitoring errors as a contributing factor in false memory formation. When people reconstruct memories, they sometimes confuse the source of information, misattributing imagined events to actual experiences or conflating details from different episodes into a single narrative. This tendency becomes more pronounced when the original memory trace is weak or when considerable time has elapsed since the original event.

The neural basis of memory malleability has become clearer through advances in neuroimaging technology. Research has shown that the act of remembering itself can alter memories, as the neural networks activated during recall are susceptible to modification. This reconsolidation process means that every time a memory is retrieved, it becomes temporarily vulnerable to change before being re-stored in a potentially altered form.

These findings have practical implications beyond the courtroom. Educational researchers have explored how understanding memory's reconstructive nature might improve teaching methods, while therapists grapple with the ethical implications of recovered memories in clinical settings. The malleability of memory, once seen merely as a limitation, is now understood to reflect a fundamental aspect of how the brain adaptively processes and integrates information across time.`,
